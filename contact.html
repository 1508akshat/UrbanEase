<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Contact | UrbanEase</title>
	<meta name="description" content="Contact UrbanEase. Send us your queries and feedback." />
	<meta name="keywords" content="Contact UrbanEase, support, feedback" />
	<meta name="author" content="UrbanEase" />
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
	<link rel="stylesheet" href="style.css" />
	<link rel="icon" href="images/favicon.png" />
	<!-- Google tag (gtag.js) -->
	<script async src="https://www.googletagmanager.com/gtag/js?id=G-GXRLNTZ9YM"></script>
	<script>
		window.dataLayer = window.dataLayer || [];
		function gtag(){dataLayer.push(arguments);}
		gtag('js', new Date());
		gtag('config', 'G-GXRLNTZ9YM');
	</script>

	<meta property="og:title" content="UrbanEase | Discover the smarter side of city living" />
	<meta property="og:description" content="Explore curated spots for food, fitness, and self-care." />
	<meta property="og:type" content="website" />
	<meta property="og:url" content="https://urbanease.com" />
	<meta property="og:image" content="https://images.unsplash.com/photo-1559339352-11d035aa65de?auto=format&fit=crop&w=1200&q=80" />
</head>
<body>
	<site-header></site-header>

	<main class="container">
		<header class="page-header">
			<h1>Contact Us</h1>
			<p>We'd love to hear from you. Send a message and we'll respond soon.</p>
		</header>

		<section class="content">
			<form class="contact-form" aria-label="Contact form" onsubmit="event.preventDefault(); alert('Thanks for reaching out! We will get back to you soon.'); this.reset();">
				<div class="form-row">
					<label for="name">Name</label>
					<input type="text" id="name" name="name" placeholder="Your full name" required />
				</div>
				<div class="form-row">
					<label for="email">Email</label>
					<input type="email" id="email" name="email" placeholder="your@email.com" required />
				</div>
				<div class="form-row">
					<label for="message">Message</label>
					<textarea id="message" name="message" placeholder="How can we help?" rows="5" required></textarea>
				</div>
				<button type="submit" class="btn btn-primary">Submit</button>
			</form>
		</section>
	</main>

	<site-footer></site-footer>

	<!-- Chatbot -->
	<urban-chatbot></urban-chatbot>


	<script src="components.js" defer></script>
	<script src="chatbot.js" defer></script>
	<script src="cart.js" defer></script>
	
</body>
</html>

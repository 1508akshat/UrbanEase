<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>My Cart | UrbanEase</title>
	<meta name="description" content="Review and manage the items and services you want to book or purchase on UrbanEase." />
	<meta name="keywords" content="cart, booking, checkout, UrbanEase" />
	<meta name="author" content="UrbanEase" />
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
	<link rel="stylesheet" href="style.css" />
	<link rel="icon" href="images/favicon.png" />
	<!-- Google tag (gtag.js) -->
	<script async src="https://www.googletagmanager.com/gtag/js?id=G-GXRLNTZ9YM"></script>
	<script>
		window.dataLayer = window.dataLayer || [];
		function gtag(){dataLayer.push(arguments);}
		gtag('js', new Date());
		gtag('config', 'G-GXRLNTZ9YM');
	</script>

	<meta property="og:title" content="UrbanEase | Discover the smarter side of city living" />
	<meta property="og:description" content="Explore curated spots for food, fitness, and self-care." />
	<meta property="og:type" content="website" />
	<meta property="og:url" content="https://urbanease.com" />
	<meta property="og:image" content="https://images.unsplash.com/photo-1559339352-11d035aa65de?auto=format&fit=crop&w=1200&q=80" />
</head>
<body>
	<site-header></site-header>

	<main class="container">
		<header class="page-header">
			<h1>My Cart</h1>
			<p>Review, add, or delete items and services before you book or purchase.</p>
		</header>

		<section class="cart-page">
			<div class="cart-main">
				<p id="cart-empty" class="cart-empty">Your cart is empty. Explore categories to start adding items.</p>
				<ul id="cart-items" class="cart-items" aria-label="Cart items"></ul>
			</div>
			<aside class="cart-summary">
				<h2>Summary</h2>
				<div class="cart-summary-row">
					<span>Total</span>
					<strong id="cart-total">₹0</strong>
				</div>
				<a href="explore.html" class="btn btn-secondary" style="width:100%; margin-top:12px;">Continue Exploring</a>
				<button type="button" class="btn btn-primary" style="width:100%; margin-top:8px;" onclick="alert('Checkout flow coming soon!')">Proceed to Checkout</button>
			</aside>
		</section>
	</main>

	<site-footer></site-footer>

	<!-- Chatbot -->
	<urban-chatbot></urban-chatbot>


	<script src="components.js" defer></script>
	<script src="chatbot.js" defer></script>
	<script src="cart.js" defer></script>
	
</body>
</html>
